<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    ========================================
    NOTES PAGE - notes.html
    ========================================
    Continuous scroll layout - all Notes
    posts displayed as one feed.
    ========================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes | Corrine Ciani</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Home button -->
    <a href="index.html" class="home-button">
        <img src="images/gifcities.gif" alt="Home">
    </a>

    <main class="blog-feed">
        <!-- Notes posts load here as a continuous scroll -->
        <div id="all-posts" class="blog-scroll">

        </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadNotes();
        });
    </script>
</body>
</html>
